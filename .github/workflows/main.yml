name: Trading Bot Esecutivo
on:
  schedule:
    - cron: '45 20 * * 1-5' # Ogni giorno alle 22:45
  workflow_dispatch: # Permette il tasto "Run Workflow" manuale

permissions:
  contents: write  # FONDAMENTALE: permette al bot di scrivere nel repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Autorizzazione automatica

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Installazione Librerie
        run: pip install yfinance pandas requests

      - name: Esecuzione Bot
        run: python controller_completo_automatico.py

      - name: Commit e Push dei Log
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add decision_log.csv
          git commit -m "Aggiornamento log decisionale automatico"
          git push
